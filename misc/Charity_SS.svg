    C 1032 734 1022 748 1022 766
    C 1022 782 1024 808 1024 820

    L 1020 810
    C 1018 792 1012 770 1004 756
    C 996  742 982  734 968  736
    C 954  738 944  752 944  768
    C 944  784 948  806 950  820

