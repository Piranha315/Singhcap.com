<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1504 1376" width="1504" height="1376">
  <defs>
    <!-- Sky gradient: deep indigo at top to warm amber at horizon -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d1b3e"/>
      <stop offset="45%"  stop-color="#1a2e6e"/>
      <stop offset="72%"  stop-color="#c2612a"/>
      <stop offset="88%"  stop-color="#e8932d"/>
      <stop offset="100%" stop-color="#f5c84a"/>
    </linearGradient>

    <!-- Ground gradient -->
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a1525"/>
      <stop offset="100%" stop-color="#060d18"/>
    </linearGradient>

    <!-- Orb glow: warm light radiating outward -->
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff8e7" stop-opacity="1"/>
      <stop offset="20%"  stop-color="#ffe566" stop-opacity="0.95"/>
      <stop offset="55%"  stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c2612a"  stop-opacity="0"/>
    </radialGradient>

    <!-- Large ambient glow behind hands -->
    <radialGradient id="ambientGlow" cx="50%" cy="38%" r="38%">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#c2612a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0d1b3e" stop-opacity="0"/>
    </radialGradient>

    <!-- Hands silhouette gradient (dark with slight warm rim) -->
    <linearGradient id="handFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1c2d4a"/>
      <stop offset="100%" stop-color="#080f1d"/>
    </linearGradient>

    <!-- Rim light on hands -->
    <radialGradient id="rimLight" cx="50%" cy="0%" r="80%">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <filter id="glowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="tinyBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- ── Background sky ── -->
  <rect width="1504" height="1376" fill="url(#sky)"/>

  <!-- ── Stars (upper portion) ── -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="112"  cy="58"  r="1.2"/>
    <circle cx="230"  cy="32"  r="0.9"/>
    <circle cx="310"  cy="95"  r="1.4"/>
    <circle cx="490"  cy="44"  r="0.8"/>
    <circle cx="600"  cy="18"  r="1.1"/>
    <circle cx="710"  cy="72"  r="1.3"/>
    <circle cx="820"  cy="30"  r="0.8"/>
    <circle cx="930"  cy="55"  r="1.2"/>
    <circle cx="1050" cy="20"  r="0.9"/>
    <circle cx="1160" cy="80"  r="1.4"/>
    <circle cx="1280" cy="42"  r="1.0"/>
    <circle cx="1390" cy="64"  r="1.2"/>
    <circle cx="168"  cy="148" r="0.8"/>
    <circle cx="380"  cy="130" r="1.0"/>
    <circle cx="540"  cy="168" r="0.7"/>
    <circle cx="680"  cy="108" r="1.1"/>
    <circle cx="800"  cy="150" r="0.9"/>
    <circle cx="940"  cy="120" r="1.3"/>
    <circle cx="1100" cy="155" r="0.8"/>
    <circle cx="1240" cy="105" r="1.0"/>
    <circle cx="1420" cy="138" r="0.9"/>
    <circle cx="60"   cy="220" r="0.7"/>
    <circle cx="270"  cy="245" r="1.0"/>
    <circle cx="450"  cy="210" r="0.8"/>
    <circle cx="630"  cy="255" r="1.1"/>
    <circle cx="760"  cy="200" r="0.7"/>
    <circle cx="1020" cy="240" r="1.0"/>
    <circle cx="1200" cy="215" r="0.8"/>
    <circle cx="1350" cy="260" r="0.9"/>
    <circle cx="88"   cy="310" r="0.9"/>
    <circle cx="340"  cy="290" r="0.7"/>
    <circle cx="560"  cy="330" r="1.0"/>
    <circle cx="750"  cy="305" r="0.8"/>
    <circle cx="880"  cy="280" r="1.2"/>
    <circle cx="1080" cy="320" r="0.7"/>
    <circle cx="1300" cy="295" r="0.9"/>
  </g>

  <!-- ── Distant horizon glow (sunrise) ── -->
  <ellipse cx="752" cy="820" rx="600" ry="200" fill="#f59e0b" opacity="0.18" filter="url(#glowBlur)"/>
  <ellipse cx="752" cy="840" rx="380" ry="120" fill="#ffe566" opacity="0.14" filter="url(#glowBlur)"/>

  <!-- ── Ground / earth (dark silhouette at bottom) ── -->
  <rect x="0" y="1060" width="1504" height="316" fill="url(#ground)"/>
  <!-- Gentle rolling horizon line -->
  <path d="M0,1068 Q180,1045 350,1062 Q520,1078 700,1055 Q880,1032 1050,1060 Q1220,1086 1504,1058 L1504,1376 L0,1376 Z" fill="#060d18"/>

  <!-- ── Ambient glow behind orb / hands ── -->
  <ellipse cx="752" cy="820" rx="520" ry="320" fill="url(#ambientGlow)"/>

  <!-- ── Orb glow halo (large, blurred) ── -->
  <circle cx="752" cy="736" r="220" fill="url(#orbGlow)" filter="url(#glowBlur)" opacity="0.9"/>
  <!-- medium halo -->
  <circle cx="752" cy="736" r="110" fill="#fff8e7" filter="url(#softBlur)" opacity="0.55"/>

  <!-- ── Light rays emanating from orb ── -->
  <g opacity="0.18" filter="url(#glowBlur)">
    <!-- vertical -->
    <rect x="748" y="440" width="8" height="260" rx="4" fill="#ffe566"/>
    <!-- angled rays -->
    <rect x="748" y="440" width="6" height="240" rx="3" fill="#ffe566" transform="rotate(25 752 736)"/>
    <rect x="748" y="440" width="6" height="240" rx="3" fill="#ffe566" transform="rotate(-25 752 736)"/>
    <rect x="748" y="440" width="5" height="200" rx="3" fill="#ffe566" transform="rotate(50 752 736)"/>
    <rect x="748" y="440" width="5" height="200" rx="3" fill="#ffe566" transform="rotate(-50 752 736)"/>
    <rect x="748" y="440" width="4" height="170" rx="2" fill="#ffe566" transform="rotate(75 752 736)"/>
    <rect x="748" y="440" width="4" height="170" rx="2" fill="#ffe566" transform="rotate(-75 752 736)"/>
  </g>

  <!-- ── Orb core ── -->
  <circle cx="752" cy="736" r="52" fill="#fff8e7" opacity="0.95"/>
  <circle cx="752" cy="736" r="38" fill="#ffffff" opacity="1"/>
  <!-- inner sparkle -->
  <circle cx="740" cy="724" r="8" fill="#ffffff" opacity="0.6"/>

