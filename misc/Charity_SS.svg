  <!-- ── Floating light particles ── -->
  <g fill="#ffe566" opacity="0.8">
    <circle cx="620" cy="620" r="3"  filter="url(#tinyBlur)"/>
    <circle cx="700" cy="580" r="2"  filter="url(#tinyBlur)"/>
    <circle cx="752" cy="555" r="2.5" filter="url(#tinyBlur)"/>
    <circle cx="810" cy="600" r="2"  filter="url(#tinyBlur)"/>
